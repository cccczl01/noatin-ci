# build.conf — noatin-chatgpt-client 构建配置
# 格式：key=value（不支持引号包裹的值，等号后内容全部作为值）
name=chatgpt-client
upstream_version=1.0.0
debian_revision=1
description=ChatGPT 桌面客户端
long_desc=基于 Electron 的 ChatGPT 桌面客户端\n支持多会话管理和提示词模板\n集成语音输入功能
depends=libgtk-3-0, libglib2.0-0
homepage=https://github.com/lencx/ChatGPT

zh_name=ChatGPT 客户端
zh_summary=基于 Electron 的 ChatGPT 桌面客户端，集成语音输入
zh_desc=提供 ChatGPT 桌面访问体验\n集成语音输入功能

developer_name=Noatin OS Team
project_license=MIT

zh_keywords=AI;聊天;ChatGPT;
exec=/usr/bin/noatin-chatgpt-client
icon=/usr/share/pixmaps/com.noatin.chatgpt-client.png
icon_url=https://gitee.com/noatin/noatin-repo/raw/main/noatin-chatgpt-client/assets/icon.png
screenshot_url=https://gitee.com/noatin/noatin-repo/raw/main/noatin-chatgpt-client/assets/screenshots/main.png